definitions:
  handlers.BroadcastWakeRequest:
    properties:
      mac:
        example: "00:11:22:33:44:55"
        type: string
      port:
        example: 9
        maximum: 65535
        minimum: 1
        type: integer
    required:
    - mac
    type: object
  handlers.Response:
    properties:
      message:
        type: string
    type: object
  handlers.UpsWakeResponse:
    properties:
      message:
        example: Wake on LAN sent
        type: string
      woken:
        example: true
        type: boolean
    type: object
  handlers.WakeEvaluationRequest:
    properties:
      mac:
        example: "00:11:22:33:44:55"
        type: string
    type: object
  handlers.WakeServerRequest:
    properties:
      broadcast:
        example: 192.168.1.13
        type: string
      mac:
        example: "00:11:22:33:44:55"
        type: string
      port:
        example: 9
        maximum: 65535
        minimum: 1
        type: integer
    required:
    - broadcast
    - mac
    type: object
  viper.NutServer:
    properties:
      host:
        type: string
      name:
        type: string
      password:
        type: string
      port:
        type: integer
      targets:
        items:
          $ref: '#/definitions/viper.TargetServer'
        type: array
      username:
        type: string
    type: object
  viper.TargetServer:
    properties:
      broadcast:
        type: string
      interval:
        default: 15m
        type: string
      mac:
        type: string
      name:
        type: string
      port:
        default: 9
        type: integer
      rules:
        items:
          type: string
        type: array
    type: object
info:
  contact: {}
  description: UPSWake reads data from a UPS Nut Server and uses it to dynamically
    send Wake on Lan packets to servers
  title: UPSWake
  version: "1.0"
paths:
  /:
    get:
      consumes:
      - text/plain
      description: Redirect to swagger docs
      produces:
      - text/html
      responses: {}
      summary: Root redirect to swagger
      tags:
      - root
  /api/servers/broadcastwake:
    post:
      consumes:
      - application/json
      description: Wake a server using Wake on LAN by using the MAC and enumerating
        all available broadcast addresses
      parameters:
      - description: Broadcast wake request
        in: body
        name: broadcastWakeRequest
        required: true
        schema:
          $ref: '#/definitions/handlers.BroadcastWakeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Wake on LAN packets successfully sent to all available broadcast
            addresses
          schema:
            $ref: '#/definitions/handlers.Response'
        "400":
          description: Input validation failed
          schema:
            $ref: '#/definitions/handlers.Response'
        "500":
          description: Wake on LAN packet failed to send
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Wake a server using just a MAC
      tags:
      - servers
  /api/servers/wake:
    post:
      consumes:
      - application/json
      description: Wake a server using Wake on LAN using the MAC and broadcast address
        provided
      parameters:
      - description: Wake server request
        in: body
        name: wakeServerRequest
        required: true
        schema:
          $ref: '#/definitions/handlers.WakeServerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Wake on LAN packet sent
          schema:
            $ref: '#/definitions/handlers.Response'
        "400":
          description: Input validation failed
          schema:
            $ref: '#/definitions/handlers.Response'
        "500":
          description: Wake on LAN packet failed to send
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Wake a server using a MAC and a broadcast address
      tags:
      - servers
  /api/upswake:
    get:
      consumes:
      - application/json
      description: List NUT server mappings using the config stored in the server
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/viper.NutServer'
            type: array
      summary: List NUT server mappings
      tags:
      - UPSWake
    post:
      consumes:
      - application/json
      description: Run wake evaluation using the config and rules stored in the server
      parameters:
      - description: the mac address of the target to wake
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.WakeEvaluationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Wake on LAN sent
          schema:
            $ref: '#/definitions/handlers.UpsWakeResponse'
        "304":
          description: No rule evaluated to true
          schema:
            $ref: '#/definitions/handlers.UpsWakeResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/handlers.UpsWakeResponse'
        "404":
          description: MAC address not found in the config
          schema:
            $ref: '#/definitions/handlers.UpsWakeResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.UpsWakeResponse'
      summary: Run wake evaluation
      tags:
      - UPSWake
  /health:
    get:
      consumes:
      - application/json
      description: Health check
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.Response'
      summary: Health check
      tags:
      - root
swagger: "2.0"
