name: Release

on:
  push:
    branches:
      - main
  release:
    types:
      - published

env:
  platforms: "linux/386,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/amd64,linux/ppc64le,linux/riscv64,linux/s390x"

permissions:
  contents: read

jobs:
  release:
    name: "Release"
    environment: release
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-build-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      id-token: write # This is required for requesting the JWT for CoSign
      contents: read  # This is required for actions/checkout
      packages: write # This is required for pushing Docker images to ghcr.io
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            docker-images-prod.6aa30f8b08e16409b46e0173d6de2f56.r2.cloudflarestorage.com:443
            fulcio.sigstore.dev:443
            ghcr.io:443
            github.com:443
            index.docker.io:443
            oauth2.sigstore.dev:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            registry-1.docker.io:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443
            timestamp.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      - name: 🚚 Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        id: setup-buildx

      - name: 🔑 Log in to Docker
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Fetch git tags for `git describe`
        run: "git fetch --force --prune --unshallow --tags"

      - name: 📝 Run `git describe` and save its output
        run: echo 'GIT_DESCRIBE='`git describe --tags --always --long` >> $GITHUB_OUTPUT
        id: git-describe

      - name: 📝 Calculate metadata for minimal Docker images
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: |
            ${{ vars.DOCKER_USERNAME }}/${{ vars.DOCKER_PROJECT }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=edge
          annotations: |
            io.artifacthub.package.license=GPL-3.0
            io.artifacthub.package.readme-url=https://github.com/${{ github.repository }}/blob/main/README.md
            io.artifacthub.package.maintainers=[{"name":"DarthMole","email":"upswake@darthmole.dev"}]
          labels: |
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.authors=[{"name":"DarthMole","email":"upswake@darthmole.dev"}]
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index

      - name: 💾 Go Build Cache for Docker
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: go-cache
        with:
          path: go-build-cache
          key: ${{ runner.os }}-go-build-cache-${{ hashFiles('**/go.sum') }}
          lookup-only: true # Skip downloading cache on release builds to avoid cache poisoning

      - name: 💉 Inject go-build-cache
        uses: reproducible-containers/buildkit-cache-dance@6f699a72a59e4252f05a7435430009b77e25fe06 # v3.3.1
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          dockerfile: Containerfile
          skip-extraction: false # Populate cache on release builds, but skip extraction to avoid cache poisoning attacks on pull request builds
          # Cache only the go builds, the module download is cached via the docker layer caching
          # "linux/386,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/amd64,linux/ppc64le,linux/riscv64,linux/s390x"
          cache-map: |
            {
              "go-build-cache/build/linux386": {
                "target": "/root/.cache/go-build",
                "id": "linux386"
              },
              "go-build-cache/build/linuxarmv6": {
                "target": "/root/.cache/go-build",
                "id": "linuxarmv6"
              },
              "go-build-cache/build/linuxarmv7": {
                "target": "/root/.cache/go-build",
                "id": "linuxarmv7"
              },
              "go-build-cache/build/linuxarm64": {
                "target": "/root/.cache/go-build",
                "id": "linuxarm64"
              },
              "go-build-cache/build/linuxamd64": {
                "target": "/root/.cache/go-build",
                "id": "linuxamd64"
              },
              "go-build-cache/build/linuxppc64le": {
                "target": "/root/.cache/go-build",
                "id": "linuxppc64le"
              },
              "go-build-cache/build/linuxriscv64": {
                "target": "/root/.cache/go-build",
                "id": "linuxriscv64"
              },
              "go-build-cache/build/linuxs390x": {
                "target": "/root/.cache/go-build",
                "id": "linuxs390x"
              }
            }

      - name: 🚀 Build and deploy minimal Docker images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        with:
          target: "minimal"
          context: .
          file: ./Containerfile
          push: true
          cache-from: "" # Don't use cache on pull request builds to avoid cache poisoning attacks, but do populate it for release builds
          cache-to: "type=gha,mode=max" # Populate cache on release builds, but don't use it to avoid cache poisoning attacks on pull request builds
          build-args: |
            ${{ format('GIT_DESCRIBE={0}', steps.git-describe.outputs.GIT_DESCRIBE) }}
          platforms: ${{ env.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: "mode=max"

      - name: ✍️ Install Cosign
        if: ${{ github.event_name == 'release' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: ✍️ Sign the Docker Hub images
        if: ${{ github.event_name == 'release' }}
        run: |
          cosign sign --recursive --yes "${DOCKER_USERNAME}/${DOCKER_PROJECT}@${BUILD_DIGEST}"
        env:
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
          DOCKER_PROJECT: ${{ vars.DOCKER_PROJECT }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}

      - name: ✍️ Sign the GitHub Container Registry images
        if: ${{ github.event_name == 'release' }}
        run: |
          cosign sign --recursive --yes "ghcr.io/${GITHUB_REPOSITORY@L}@${BUILD_DIGEST}"
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
