exclude: '^internal/api/docs' # swagger.json is auto-generated but doesn't have a trailing newline, which causes the end-of-file-fixer to always fail

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.1
    hooks:
      - id: golangci-lint
